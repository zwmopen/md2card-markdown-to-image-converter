name: MCP Worker

on:
  pull_request:
    paths:
      - "apps/mcp-worker/**"
      - ".github/workflows/mcp-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mcp-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type-check and dry-run build
        run: npm run check
