                        </div>
                    </div>
                    
                    <!-- 主题配色 -->
                    <div class="color-picker">
                        <label>主题配色 <span class="info-tooltip" title="主题颜色影响模板的整体色调和强调色">ⓘ</span></label>
                        <div class="color-buttons">
                            <button class="color-btn red-btn active" data-theme="red" title="红色主题"></button>
                            <button class="color-btn blue-btn" data-theme="blue" title="蓝色主题"></button>
                            <button class="color-btn green-btn" data-theme="green" title="绿色主题"></button>
                            <button class="color-btn purple-btn" data-theme="purple" title="紫色主题"></button>
                            <button class="color-btn orange-btn" data-theme="orange" title="橙色主题"></button>
                        </div>
                    </div>
                    
                    <!-- 背景设置 -->
                    <div class="bg-selector">
                        <label>背景颜色 <span class="info-tooltip" title="背景颜色设置卡片的底色，可选择纯色背景">ⓘ</span></label>
                        <div class="color-buttons bg-color-buttons">
                            <button class="bg-color-btn" data-bg-color="#ffffff" style="background-color: #ffffff; border: 1px solid #ddd;" title="白色"></button>
                            <button class="bg-color-btn" data-bg-color="#f8f9fa" style="background-color: #f8f9fa; border: 1px solid #ddd;" title="浅灰白"></button>
                            <button class="bg-color-btn" data-bg-color="#e9ecef" style="background-color: #e9ecef; border: 1px solid #ddd;" title="灰白色"></button>
                            <button class="bg-color-btn" data-bg-color="#dee2e6" style="background-color: #dee2e6; border: 1px solid #ddd;" title="浅灰色"></button>
                            <button class="bg-color-btn" data-bg-color="#6c757d" style="background-color: #6c757d; border: 1px solid #ddd;" title="深灰色"></button>
                            <button class="bg-color-btn" data-bg-color="#ff6b6b" style="background-color: #ff6b6b; border: 1px solid #ddd;" title="珊瑚红"></button>
                            <button class="bg-color-btn" data-bg-color="#4ecdc4" style="background-color: #4ecdc4; border: 1px solid #ddd;" title="薄荷绿"></button>
                            <button class="bg-color-btn" data-bg-color="#45b7d1" style="background-color: #45b7d1; border: 1px solid #ddd;" title="天空蓝"></button>
                            <button class="bg-color-btn" data-bg-color="#96ceb4" style="background-color: #96ceb4; border: 1px solid #ddd;" title="柠檬绿"></button>
                            <button class="bg-color-btn" data-bg-color="#ffeaa7" style="background-color: #ffeaa7; border: 1px solid #ddd;" title="奶油黄"></button>
                            <button class="bg-color-btn" data-bg-color="#89c8d3" style="background-color: #89c8d3; border: 1px solid #ddd;" title="湖水蓝"></button>
                            <button class="bg-color-btn" data-bg-color="#a5d6a7" style="background-color: #a5d6a7; border: 1px solid #ddd;" title="草地绿"></button>
                            <button class="bg-color-btn" data-bg-color="#ffcc80" style="background-color: #ffcc80; border: 1px solid #ddd;" title="沙滩橙"></button>
                            <button class="bg-color-btn" data-bg-color="#d7ccc8" style="background-color: #d7ccc8; border: 1px solid #ddd;" title="沙滩灰"></button>
                            <button class="bg-color-btn" data-bg-color="#ffab91" style="background-color: #ffab91; border: 1px solid #ddd;" title="日落橙"></button>
                            <button class="bg-color-btn" data-bg-color="#ff5252" style="background-color: #ff5252; border: 1px solid #ddd;" title="鲜红"></button>
                            <button class="bg-color-btn" data-bg-color="#ff4081" style="background-color: #ff4081; border: 1px solid #ddd;" title="粉红"></button>
                            <button class="bg-color-btn" data-bg-color="#673ab7" style="background-color: #673ab7; border: 1px solid #ddd;" title="深紫"></button>
                            <button class="bg-color-btn" data-bg-color="#3f51b5" style="background-color: #3f51b5; border: 1px solid #ddd;" title="靛蓝"></button>
                            <button class="bg-color-btn" data-bg-color="#00bcd4" style="background-color: #00bcd4; border: 1px solid #ddd;" title="青绿"></button>
                        </div>
                    </div>
                    
                    <!-- 背景图选择 -->
                    <div class="bg-selector">
                        <label>背景图片</label>
                        <div class="bg-controls">
                            <input type="file" id="bgFileInput" accept="image/*" class="bg-file-input">
                            <button id="bgUploadBtn" class="bg-btn small-btn">
                                <i class="fas fa-upload"></i>
                                替换
                            </button>
                            <button id="bgClearBtn" class="bg-btn clear small-btn">
                                <i class="fas fa-times"></i>
                                清除
                            </button>
                        </div>
                    </div>
                    
                    <!-- 内容背景设置 -->
                    <div class="bg-selector">
                        <label>内容背景透明度: <span id="opacityValue">100</span>%</label>
                        <input type="range" id="opacitySlider" min="0" max="100" value="100" class="slider">
                    </div>
                    
                    <!-- 样式调整 -->
                    <div class="style-controls">
                        <div class="control-group">
                            <label for="fontSizeSlider">字号: <span id="fontSizeValue">16</span>px</label>
                            <input type="range" id="fontSizeSlider" min="12" max="24" value="16" class="slider">
                        </div>
                        
                        <div class="control-group">
                            <label for="paddingSlider">内边距: <span id="paddingValue">20</span>px</label>
                            <input type="range" id="paddingSlider" min="10" max="40" value="20" class="slider">
                        </div>
                        
                        <div class="control-group">
                            <label for="borderRadiusSlider">圆角: <span id="borderRadiusValue">0</span>px</label>
                            <input type="range" id="borderRadiusSlider" min="0" max="20" value="0" class="slider">
                        </div>
                        
                        <div class="control-group">
                            <label for="cardWidthSlider">卡片宽度: <span id="cardWidthValue">400</span>px</label>
                            <input type="range" id="cardWidthSlider" min="300" max="600" value="400" class="slider">
                        </div>
                        
                        <div class="control-group">
                            <label for="cardHeightSlider">卡片高度: <span id="cardHeightValue">533</span>px</label>
                            <input type="range" id="cardHeightSlider" min="400" max="800" value="533" class="slider">
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="preview-section">
                <div class="preview-header">
                    <h3><i class="fas fa-eye"></i> 实时预览</h3>
                    <div class="preview-controls">
                        <div class="export-controls">
                            <button id="exportAllBtn" class="export-btn small-btn">
                                <i class="fas fa-download"></i>
                                导出所有图片
                            </button>
                            <button id="exportZipBtn" class="export-btn small-btn">
                                <i class="fas fa-file-archive"></i>
                                导出成压缩包
                            </button>
                            <button id="batchProcessBtn" class="export-btn small-btn">
                                <i class="fas fa-batch"></i>
                                批量处理文件
                            </button>
                        </div>
                    </div>
                </div>
                
                <div class="preview-container">
                    <!-- 长图模式 -->
                    <div class="long-image-area" id="longImageArea" style="display: none;">
                        <div id="cardPreview" class="card xiaohongshu-template red-theme">
                            <div class="card-content" id="cardContent">
                                <h1>欢迎使用MD2Card</h1>
                                <p>在左侧输入Markdown内容</p>
                                <p>选择模板和样式</p>
                                <p>实时预览效果</p>
                                <p>一键导出高清图片</p>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 小红书模式 -->
                    <div class="xiaohongshu-area" id="xiaohongshuArea">
                        <div class="xiaohongshu-grid" id="xiaohongshuGrid">
                            <!-- 小红书卡片将在这里动态生成 -->
                        </div>
                        
                        <!-- 分页控制 -->
                        <div class="pagination-controls" id="paginationControls" style="display: none;">
                            <button id="prevBtn" class="page-btn">
                                <i class="fas fa-chevron-left"></i>
                                上一页
                            </button>
                            <span id="pageInfo" class="page-info">第 1 页，共 1 页</span>
                            <button id="nextBtn" class="page-btn">
                                下一页
                                <i class="fas fa-chevron-right"></i>
                            </button>
                        </div>
                        
                        <!-- 批量预览按钮 -->
                        <div class="batch-export" id="batchExport" style="display: none;">
                            <button id="downloadAllBtn" class="export-btn batch-btn">
                                <i class="fas fa-eye"></i>
                                批量预览所有卡片
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script-fixed.js"></script>
</body>
</html>
