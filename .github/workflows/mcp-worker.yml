name: MCP Worker

on:
  pull_request:
    paths:
      - "apps/mcp-worker/**"
      - ".github/workflows/mcp-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: bounded-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/mcp-worker
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type-check and dry-run build
        run: npm run check
