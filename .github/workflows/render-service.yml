name: Render Service

on:
  pull_request:
    paths:
      - "apps/render-service/**"
      - ".github/workflows/render-service.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: render-service-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/render-service
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type-check
        shell: bash
        run: set -o pipefail; npm run type-check 2>&1 | tee typecheck.log

      - name: Upload type-check diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: render-service-typecheck
          path: apps/render-service/typecheck.log
          if-no-files-found: error

      - name: Run unit tests
        run: npm test

      - name: Build production JavaScript
        run: npm run build

      - name: Install Chromium and system dependencies
        run: npx playwright install --with-deps chromium

      - name: Render a real PNG and ZIP
        run: npm run test:render
