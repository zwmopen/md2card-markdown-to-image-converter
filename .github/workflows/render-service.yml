name: Render Service

on:
  pull_request:
    paths:
      - "apps/render-service/**"
      - ".github/workflows/render-service.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/render-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Chromium and system dependencies
        run: npx playwright install --with-deps chromium

      - name: Type-check, unit test, build, and render a real PNG
        run: npm run check:e2e
