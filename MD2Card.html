<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD2Card - Markdown 转知识卡片工具</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <style>
        :root {
            /* 苹果风格的颜色变量 */
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #0071e3;
            --border-color: #d2d2d7;
            --shadow-light: rgba(0, 0, 0, 0.05);
            --shadow-medium: rgba(0, 0, 0, 0.1);
            --shadow-heavy: rgba(0, 0, 0, 0.15);
            --neumorphic-light: rgba(255, 255, 255, 0.8);
            --neumorphic-dark: rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Text', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr 320px;
            gap: 20px;
            padding: 20px;
            min-height: 100vh;
        }

        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 1fr 1fr;
                grid-template-rows: auto auto;
            }
            .controls {
                grid-column: span 2;
                order: 3;
            }
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                padding: 10px;
                gap: 10px;
            }
            .controls {
                grid-column: span 1;
            }
        }

        .section {
            background-color: var(--bg-secondary);
            border-radius: 12px;
            box-shadow: 0 4px 12px var(--shadow-light);
            padding: 20px;
            overflow: hidden;
        }

        /* 拟态效果 */
        .neumorphic {
            background: linear-gradient(145deg, var(--neumorphic-light), var(--bg-secondary));
            box-shadow: 5px 5px 10px var(--neumorphic-dark), -5px -5px 10px var(--neumorphic-light);
        }

        /* 编辑器部分 */
        .editor {
            display: flex;
            flex-direction: column;
        }

        .editor h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .editor textarea {
            flex: 1;
            width: 100%;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            background-color: var(--bg-primary);
        }

        /* 预览部分 */
        .preview {
            display: flex;
            flex-direction: column;
        }

        .preview h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .export-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: #0077ed;
        }

        .btn-secondary {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: #e8e8ed;
        }

        .preview-content {
            flex: 1;
            padding: 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: white;
            overflow-y: auto;
        }

        .card-preview {
            max-width: 440px;
            margin: 0 auto;
            background-color: white;
            border-radius: 12px;
            overflow: hidden;
        }

        .card-content {
            padding: 30px;
        }

        /* 样式控制部分 */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .controls h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group h3 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 颜色选择器 */
        .color-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .color-swatch {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .color-swatch:hover {
            transform: scale(1.05);
        }

        .color-swatch.active {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(0, 113, 227, 0.2);
        }

        /* 背景图片控制 */
        .background-image {
            margin-bottom: 15px;
        }

        .bg-buttons {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .bg-btn {
            flex: 1;
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--bg-primary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .bg-btn:hover {
            background-color: #e8e8ed;
        }

        /* 比例控制 */
        .ratio-control {
            margin-bottom: 15px;
        }

        .ratio-select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--bg-primary);
            font-size: 14px;
            cursor: pointer;
        }

        /* Markdown 样式 */
        .card-content h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .card-content h2 {
            font-size: 20px;
            font-weight: 600;
            margin: 20px 0 10px 0;
            color: var(--text-primary);
        }

        .card-content h3 {
            font-size: 16px;
            font-weight: 600;
            margin: 15px 0 8px 0;
            color: var(--text-primary);
        }

        .card-content p {
            margin-bottom: 15px;
            line-height: 1.6;
            color: var(--text-primary);
        }

        .card-content ul, .card-content ol {
            margin-bottom: 15px;
            padding-left: 20px;
        }

        .card-content li {
            margin-bottom: 5px;
            line-height: 1.5;
        }

        .card-content blockquote {
            border-left: 4px solid var(--accent-color);
            padding-left: 15px;
            margin: 15px 0;
            font-style: italic;
            color: var(--text-secondary);
        }

        .card-content code {
            background-color: var(--bg-primary);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
            font-size: 12px;
        }

        .card-content pre {
            background-color: var(--bg-primary);
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin-bottom: 15px;
        }

        .card-content pre code {
            background: none;
            padding: 0;
        }

        .card-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 15px 0;
        }

        .card-content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }

        .card-content th, .card-content td {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            text-align: left;
        }

        .card-content th {
            background-color: var(--bg-primary);
            font-weight: 600;
        }

        /* 加载动画 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100px;
        }

        .loading::after {
            content: '';
            width: 24px;
            height: 24px;
            border: 2px solid var(--border-color);
            border-top: 2px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 编辑器部分 -->
        <div class="section editor">
            <h2>Markdown 编辑器</h2>
            <textarea id="markdownEditor" placeholder="在此输入 Markdown 内容..."># 知识卡片标题

## 副标题

这是一个知识卡片示例，使用 Markdown 语法编写。

### 功能特点
- 支持 Markdown 语法
- 实时预览
- 多种样式选择
- 导出为图片

### 代码示例
```javascript
function hello() {
    console.log('Hello, World!');
}
```

### 引用
> 知识就是力量

### 表格
| 名称 | 功能 |
|------|------|
| MD2Card | Markdown 转卡片 |
| 实时预览 | 即时查看效果 |
| 样式控制 | 自定义卡片样式 |
</textarea>
        </div>

        <!-- 预览部分 -->
        <div class="section preview">
            <div class="preview-header">
                <h2>实时预览</h2>
                <div class="export-buttons">
                    <button class="btn btn-secondary" id="exportImageBtn">导出图片</button>
                    <button class="btn btn-primary" id="exportZipBtn">导出压缩包</button>
                </div>
            </div>
            <div class="preview-content">
                <div class="card-preview" id="cardPreview">
                    <div class="card-content" id="renderedContent">
                        <!-- 渲染后的内容将显示在这里 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 样式控制部分 -->
        <div class="section controls neumorphic">
            <h2>样式控制</h2>
            
            <!-- 主题颜色 -->
            <div class="control-group">
                <h3>主题颜色</h3>
                <div class="color-grid" id="themeColors">
                    <div class="color-swatch active" data-color="#ea4c89" style="background-color: #ea4c89;"></div>
                    <div class="color-swatch" data-color="#0071e3" style="background-color: #0071e3;"></div>
                    <div class="color-swatch" data-color="#34c759" style="background-color: #34c759;"></div>
                    <div class="color-swatch" data-color="#ff9500" style="background-color: #ff9500;"></div>
                    <div class="color-swatch" data-color="#af52de" style="background-color: #af52de;"></div>
                    <div class="color-swatch" data-color="#ff2d55" style="background-color: #ff2d55;"></div>
                </div>
            </div>

            <!-- 背景颜色 -->
            <div class="control-group">
                <h3>背景颜色</h3>
                <div class="color-grid" id="bgColors">
                    <div class="color-swatch active" data-color="#ffffff" style="background-color: #ffffff;"></div>
                    <div class="color-swatch" data-color="#f5f5f7" style="background-color: #f5f5f7;"></div>
                    <div class="color-swatch" data-color="#1d1d1f" style="background-color: #1d1d1f;"></div>
                    <div class="color-swatch" data-color="#2c2c2e" style="background-color: #2c2c2e;"></div>
                    <div class="color-swatch" data-color="#f2f2f7" style="background-color: #f2f2f7;"></div>
                    <div class="color-swatch" data-color="#e8e8ed" style="background-color: #e8e8ed;"></div>
                </div>
            </div>

            <!-- 背景图片 -->
            <div class="control-group">
                <h3>背景图片</h3>
                <input type="file" id="bgImageInput" accept="image/*" style="display: none;">
                <div class="bg-buttons">
                    <button class="bg-btn" id="replaceBgBtn">替换</button>
                    <button class="bg-btn" id="clearBgBtn">清除</button>
                </div>
            </div>

            <!-- 比例控制 -->
            <div class="control-group">
                <h3>卡片比例</h3>
                <select class="ratio-select" id="ratioSelect">
                    <option value="16:9">16:9</option>
                    <option value="4:3">4:3</option>
                    <option value="3:4" selected>小红书 3:4</option>
                    <option value="1:1">1:1</option>
                    <option value="9:16">9:16</option>
                </select>
            </div>
        </div>
    </div>

    <script>
        // 全局变量
        let currentThemeColor = '#ea4c89';
        let currentBgColor = '#ffffff';
        let currentRatio = '3:4';
        let currentBgImage = null;

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initEditor();
            initColorPickers();
            initBackgroundControls();
            initRatioControl();
            initExportButtons();
            renderMarkdown();
        });

        // 初始化编辑器
        function initEditor() {
            const editor = document.getElementById('markdownEditor');
            editor.addEventListener('input', renderMarkdown);
        }

        // 渲染 Markdown
        function renderMarkdown() {
            const editor = document.getElementById('markdownEditor');
            const content = editor.value;
            const renderedContent = document.getElementById('renderedContent');
            
            // 使用 marked.js 渲染 Markdown
            const html = marked.parse(content);
            renderedContent.innerHTML = html;
            
            // 应用当前样式
            applyStyles();
        }

        // 应用样式
        function applyStyles() {
            const cardPreview = document.getElementById('cardPreview');
            const cardContent = document.getElementById('renderedContent');
            
            // 应用背景颜色
            cardPreview.style.backgroundColor = currentBgColor;
            
            // 应用背景图片
            if (currentBgImage) {
                cardPreview.style.backgroundImage = `url(${currentBgImage})`;
                cardPreview.style.backgroundSize = 'cover';
                cardPreview.style.backgroundPosition = 'center';
                cardContent.style.backgroundColor = 'rgba(255, 255, 255, 0.8)';
                cardContent.style.backdropFilter = 'blur(10px)';
            } else {
                cardPreview.style.backgroundImage = 'none';
                cardContent.style.backgroundColor = 'transparent';
                cardContent.style.backdropFilter = 'none';
            }
            
            // 应用主题颜色到链接和强调元素
            const links = cardContent.querySelectorAll('a');
            links.forEach(link => {
                link.style.color = currentThemeColor;
            });
            
            const blockquotes = cardContent.querySelectorAll('blockquote');
            blockquotes.forEach(quote => {
                quote.style.borderLeftColor = currentThemeColor;
            });
        }

        // 初始化颜色选择器
        function initColorPickers() {
            // 主题颜色
            const themeColors = document.getElementById('themeColors');
            themeColors.addEventListener('click', function(e) {
                if (e.target.classList.contains('color-swatch')) {
                    document.querySelectorAll('#themeColors .color-swatch').forEach(swatch => {
                        swatch.classList.remove('active');
                    });
                    e.target.classList.add('active');
                    currentThemeColor = e.target.dataset.color;
                    renderMarkdown();
                }
            });
            
            // 背景颜色
            const bgColors = document.getElementById('bgColors');
            bgColors.addEventListener('click', function(e) {
                if (e.target.classList.contains('color-swatch')) {
                    document.querySelectorAll('#bgColors .color-swatch').forEach(swatch => {
                        swatch.classList.remove('active');
                    });
                    e.target.classList.add('active');
                    currentBgColor = e.target.dataset.color;
                    currentBgImage = null; // 清除背景图片
                    renderMarkdown();
                }
            });
        }

        // 初始化背景控制
        function initBackgroundControls() {
            const replaceBgBtn = document.getElementById('replaceBgBtn');
            const clearBgBtn = document.getElementById('clearBgBtn');
            const bgImageInput = document.getElementById('bgImageInput');
            
            replaceBgBtn.addEventListener('click', function() {
                bgImageInput.click();
            });
            
            clearBgBtn.addEventListener('click', function() {
                currentBgImage = null;
                renderMarkdown();
            });
            
            bgImageInput.addEventListener('change', function(e) {
                if (e.target.files && e.target.files[0]) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        currentBgImage = e.target.result;
                        renderMarkdown();
                    };
                    reader.readAsDataURL(e.target.files[0]);
                }
            });
        }

        // 初始化比例控制
        function initRatioControl() {
            const ratioSelect = document.getElementById('ratioSelect');
            ratioSelect.addEventListener('change', function() {
                currentRatio = this.value;
                const cardPreview = document.getElementById('cardPreview');
                
                // 根据比例设置卡片尺寸
                const [width, height] = currentRatio.split(':').map(Number);
                const aspectRatio = width / height;
                
                if (aspectRatio > 1) {
                    // 横版
                    cardPreview.style.width = '100%';
                    cardPreview.style.maxWidth = '600px';
                    cardPreview.style.height = 'auto';
                } else {
                    // 竖版
                    cardPreview.style.width = '440px';
                    cardPreview.style.height = 'auto';
                }
            });
        }

        // 初始化导出按钮
        function initExportButtons() {
            const exportImageBtn = document.getElementById('exportImageBtn');
            const exportZipBtn = document.getElementById('exportZipBtn');
            
            exportImageBtn.addEventListener('click', exportImage);
            exportZipBtn.addEventListener('click', exportZip);
        }

        // 导出为图片
        function exportImage() {
            const cardPreview = document.getElementById('cardPreview');
            
            // 显示加载状态
            const loadingElement = document.createElement('div');
            loadingElement.className = 'loading';
            loadingElement.id = 'exportLoading';
            cardPreview.parentNode.appendChild(loadingElement);
            
            // 使用 html2canvas 生成图片
            html2canvas(cardPreview, {
                scale: 2, // 提高分辨率
                useCORS: true,
                logging: false
            }).then(canvas => {
                // 移除加载状态
                document.getElementById('exportLoading').remove();
                
                // 创建下载链接
                const link = document.createElement('a');
                link.download = '知识卡片.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(error => {
                console.error('导出失败:', error);
                document.getElementById('exportLoading').remove();
                alert('导出失败，请重试');
            });
        }

        // 导出为压缩包
        function exportZip() {
            // 这里简化处理，实际项目中可以使用 JSZip 库
            alert('压缩包导出功能将在下一版本中实现');
            // 临时调用导出图片功能
            exportImage();
        }
    </script>
</body>
</html>
