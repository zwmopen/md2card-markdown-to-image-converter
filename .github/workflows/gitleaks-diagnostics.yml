name: Gitleaks diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        shell: bash
        run: |
          version="8.24.2"
          arch="linux_x64"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_${arch}.tar.gz"
          curl -sSL -o /tmp/gitleaks.tar.gz "$url"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Generate report
        run: gitleaks git --exit-code 0 --report-format json --report-path gitleaks-report.json

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-diagnostics
          path: gitleaks-report.json
          if-no-files-found: error
