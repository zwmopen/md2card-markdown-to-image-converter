name: Secret scan

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: secret-scan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install gitleaks
        shell: bash
        run: |
          version="8.30.1"
          arch="linux_x64"
          url="https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_${arch}.tar.gz"
          curl -sSL -o /tmp/gitleaks.tar.gz "$url"
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks
        run: gitleaks git --report-format json --report-path gitleaks-report.json
